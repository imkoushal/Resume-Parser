<div class="auth-container">
  <div class="auth-card">
    <h1>🔐 Login</h1>
    <p class="subtitle">Sign in to Resume Intelligence Platform</p>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit" [disabled]="loading || !email || !password" class="btn-primary">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="switch-link">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
