<div class="auth-container">
  <div class="auth-card">
    <h1>📝 Register</h1>
    <p class="subtitle">Create your account</p>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" [(ngModel)]="fullName" name="fullName" placeholder="John Doe" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Min 6 characters" required minlength="6" />
      </div>

      <button type="submit" [disabled]="loading || !fullName || !email || !password" class="btn-primary">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="switch-link">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
